<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER-CAESAR // Encryption & Decryption</title>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: rgba(18, 26, 43, 0.85);
      --text: #e2e8f0;
      --accent: #38bdf8;
      --encrypt-color: #a855f7;
      --decrypt-color: #2ed573;
      --border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.12) 0px, transparent 50%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      padding: 2.25rem 2rem;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 480px;
    }

    .header {
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .header h2 {
      font-size: 1.2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    textarea, input[type="number"] {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    textarea {
      height: 80px;
      resize: vertical;
    }

    textarea:focus, input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
    }

    .results-container {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 10px;
      border: 1px solid var(--border);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
    }

    .result-line {
      margin-bottom: 0.5rem;
      word-break: break-all;
    }

    .result-line:last-child {
      margin-bottom: 0;
    }

    .label-orig { color: #94a3b8; }
    .label-enc { color: var(--encrypt-color); font-weight: bold; }
    .label-dec { color: var(--decrypt-color); font-weight: bold; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <h2>CYBER-CAESAR (Caesar Cipher)</h2>
    </div>

    <!-- Message Input -->
    <div class="field">
      <label for="messageInput">Enter Message to Process</label>
      <textarea id="messageInput" placeholder="Type your message here..." spellcheck="false"></textarea>
    </div>

    <!-- Shift Key Input -->
    <div class="field">
      <label for="shiftInput">Enter Any Number</label>
      <input type="number" id="shiftInput" placeholder="e.g., 3, 25, or -7">
    </div>

    <!-- Results Box -->
    <div class="results-container">
      <div class="result-line">
        <span class="label-orig">Original Text  : </span><span id="origText">---</span>
      </div>
      <div class="result-line">
        <span class="label-enc">Encrypted Text : </span><span id="encText">---</span>
      </div>
      <div class="result-line">
        <span class="label-dec">Decrypted Text : </span><span id="decText">---</span>
      </div>
    </div>
  </div>

  <script>
    const messageInput = document.getElementById('messageInput');
    const shiftInput = document.getElementById('shiftInput');
    const origText = document.getElementById('origText');
    const encText = document.getElementById('encText');
    const decText = document.getElementById('decText');

    function caesarCipher(text, shift, mode = 'encrypt') {
      let shiftVal = parseInt(shift) || 0;
      if (mode === 'decrypt') {
        shiftVal = -shiftVal;
      }

      return text.split('').map(char => {
        const code = char.charCodeAt(0);

        if (code >= 65 && code <= 90) {
          return String.fromCharCode(((code - 65 + shiftVal) % 26 + 26) % 26 + 65);
        }
        if (code >= 97 && code <= 122) {
          return String.fromCharCode(((code - 97 + shiftVal) % 26 + 26) % 26 + 97);
        }
        if (code >= 48 && code <= 57) {
          return String.fromCharCode(((code - 48 + shiftVal) % 10 + 10) % 10 + 48);
        }
        return char;
      }).join('');
    }

    function runCipher() {
      const message = messageInput.value;
      const shiftKey = shiftInput.value;

      // Require both text and shift number before updating results
      if (!message || shiftKey === '') {
        origText.textContent = '---';
        encText.textContent = '---';
        decText.textContent = '---';
        return;
      }

      const encryptedMsg = caesarCipher(message, shiftKey, 'encrypt');
      const decryptedMsg = caesarCipher(encryptedMsg, shiftKey, 'decrypt');

      origText.textContent = message;
      encText.textContent = encryptedMsg;
      decText.textContent = decryptedMsg;
    }

    messageInput.addEventListener('input', runCipher);
    shiftInput.addEventListener('input', runCipher);

    runCipher();
  </script>
</body>
</html>
